apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: loki
  namespace: monitoring

spec:
  serviceName: loki-headless
  replicas: 1
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: loki

  template:
    metadata:
      labels:
        app: loki

    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001

      containers:
        - name: loki
          image: grafana/loki:3.6.8
          imagePullPolicy: IfNotPresent

          args:
            - "-config.file=/etc/loki/config.yaml"

          ports:
            - name: http
              containerPort: 3100

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: config
              mountPath: /etc/loki

            - name: storage
              mountPath: /loki

      volumes:
        - name: config
          configMap:
            name: loki-config

  volumeClaimTemplates:
    - metadata:
        name: storage

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: local-path

        resources:
          requests:
            storage: 10Gi
