apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail

spec:
  selector:
    matchLabels:
      app: promtail

  template:
    metadata:
      labels:
        app: promtail

    spec:
      serviceAccountName: promtail

      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: promtail
          image: grafana/promtail:3.6.8
          imagePullPolicy: IfNotPresent

          args:
            - "-config.file=/etc/promtail/promtail.yaml"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 0

          volumeMounts:
            - name: config
              mountPath: /etc/promtail

            - name: varlog
              mountPath: /var/log/pods
              readOnly: true

            - name: positions
              mountPath: /run/promtail

      volumes:
        - name: config
          configMap:
            name: promtail-config

        - name: varlog
          hostPath:
            path: /var/log/pods
            type: Directory

        - name: positions
          emptyDir: {}
