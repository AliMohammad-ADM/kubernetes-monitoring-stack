apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: alloy

  template:
    metadata:
      labels:
        app: alloy

    spec:
      serviceAccountName: alloy

      containers:
        - name: alloy
          image: grafana/alloy:v1.17.1
          imagePullPolicy: IfNotPresent

          args:
            - run
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy

          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true

            - name: varlog
              mountPath: /var/log/pods
              readOnly: true

            - name: alloy-data
              mountPath: /var/lib/alloy/data

      tolerations:
        - operator: Exists

      volumes:
        - name: config
          configMap:
            name: alloy-config

        - name: varlog
          hostPath:
            path: /var/log/pods

        - name: alloy-data
          emptyDir: {}
