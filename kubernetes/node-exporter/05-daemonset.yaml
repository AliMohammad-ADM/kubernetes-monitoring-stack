apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring

spec:
  selector:
    matchLabels:
      app: node-exporter

  template:
    metadata:
      labels:
        app: node-exporter

    spec:
      serviceAccountName: node-exporter

      hostPID: true

      tolerations:
        - operator: Exists

      containers:
        - name: node-exporter

          image: ghcr.io/prometheus/node_exporter:v1.12.1
          imagePullPolicy: IfNotPresent

          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/rootfs
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)

          ports:
            - containerPort: 9100
              name: metrics

          resources:
            requests:
              cpu: 50m
              memory: 64Mi

            limits:
              cpu: 200m
              memory: 128Mi

          securityContext:
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true

            - name: sys
              mountPath: /host/sys
              readOnly: true

            - name: root
              mountPath: /rootfs
              readOnly: true

      volumes:
        - name: proc
          hostPath:
            path: /proc

        - name: sys
          hostPath:
            path: /sys

        - name: root
          hostPath:
            path: /
